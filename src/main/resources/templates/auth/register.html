<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>[[#{register.title}]] – FIFA WC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="auth-page">
    <div class="auth-card">
        <h1 class="auth-card__title auth-card__title--red" th:text="#{register.title}">Maak een account</h1>
        <p class="auth-card__subtitle" th:text="#{register.paragraph}">Gratis deelnemen aan de prognosecompetitie</p>

        <div th:if="${errorMessage}" class="alert alert--danger" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" th:object="${registerRequest}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label" th:text="#{register.username.label}">Gebruikersnaam</label>
                <input type="text" th:field="*{username}" class="form-control"
                       th:placeholder="#{register.username.placeholder}"/>
                <span class="field-error" th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label class="form-label" th:text="#{register.email.label}">E-mailadres</label>
                <input type="email" th:field="*{email}" class="form-control"
                       th:placeholder="#{register.email.placeholder}"/>
                <span class="field-error" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label class="form-label" th:text="#{register.password.label}">Wachtwoord</label>
                <input type="password" th:field="*{password}" class="form-control"
                       th:placeholder="#{register.password.placeholder}"/>
                <span class="field-error" th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label class="form-label" th:text="#{register.confirm.label}">Bevestig wachtwoord</label>
                <input type="password" th:field="*{confirmPassword}" class="form-control"
                       th:placeholder="#{register.confirm.placeholder}"/>
                <span class="field-error" th:errors="*{confirmPassword}"></span>
            </div>

            <button type="submit" class="btn btn--red btn--full" th:text="#{register.submit}">
                Account aanmaken
            </button>
        </form>

        <p class="auth-card__footer">
            <span th:text="#{register.already.account}">Al een account?</span>
            <a th:href="@{/login}" th:text="#{register.login.link}">Inloggen</a>
        </p>
    </div>
</main>
<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
