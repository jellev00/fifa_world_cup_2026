<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{scoreboard.top10.title}">Publieke Top 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container">
        <div class="page-header">
            <p class="page-header__eyebrow" th:text="#{scoreboard.Ranking}">Rangschikking</p>
            <h1 class="page-header__title" th:text="#{scoreboard.top10.title}">Publieke Top 10</h1>
            <p class="page-header__subtitle" th:text="#{scoreboard.top10.subtitle}">
                De beste fantasy-teams ter wereld
            </p>
        </div>

        <!-- Table header -->
        <div class="top10-table__head">
            <div class="top10-table__head-cell" th:text="#{scoreboard.rank}">#</div>
            <div class="top10-table__head-cell" th:text="#{scoreboard.team}">Team</div>
            <div class="top10-table__head-cell" th:text="#{scoreboard.members}">Leden</div>
            <div class="top10-table__head-cell" th:text="#{scoreboard.score}">Score</div>
        </div>

        <!-- Rows -->
        <div th:if="${not #lists.isEmpty(top10)}">
            <div th:each="entry : ${top10}" class="top10-row">
                <div class="top10-row__rank"
                     th:text="${#numbers.formatInteger(entry.rank, 2)}">01</div>
                <div class="top10-row__name" th:text="${entry.team.name}">Penalty Kings</div>
                <div class="top10-row__count" th:text="${entry.memberCount} + ' leden'">4</div>
                <div class="top10-row__score" th:text="${entry.totalScore}">312</div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(top10)}" class="empty-state">
            <p class="empty-state__title" th:text="#{team.no.team}">Nog geen teams</p>
            <p class="empty-state__text" th:text="#{team.no.team.paragraph}">Maak een team aan en doe voorspellingen om hier te verschijnen.</p>
        </div>

    </div>
</main>

<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
