<!-- ERROR 404 -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <title>404 – Pagina niet gevonden</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="error-page">
            <div class="error-page__code" th:text="${errorCode ?: '404'}">404</div>
            <h1 class="error-page__title" th:text="${errorTitle ?: 'Pagina niet gevonden'}">Pagina niet gevonden</h1>
            <p class="error-page__message" th:text="${errorMessage ?: 'De pagina die je zoekt bestaat niet.'}">
                De gevraagde pagina bestaat niet of werd verplaatst.
            </p>
            <a th:href="@{/}" class="btn btn--primary" th:text="#{error.back.home}">🏠 Terug naar homepage</a>
        </div>
    </div>
</main>
<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
