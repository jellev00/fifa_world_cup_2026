<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${team.name} + ' – FIFA WC 2026'">Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container">

        <!-- Header -->
        <div class="page-header">
            <p class="page-header__eyebrow" th:text="#{team.title}">Mijn Team</p>
            <h1 class="page-header__title" th:text="${team.name}">Teamnaam</h1>
            <p class="page-header__subtitle">
                <span th:text="#{team.owner}">Eigenaar:</span>
                <strong th:text="${team.owner.username}"></strong>
                <span th:if="${isOwner}" class="badge-owner" th:text="#{team.owner.you}">jij</span>
            </p>
            <p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;">
                <span th:text="#{team.score}">Totaalscore</span>:
                <strong th:text="${totalTeamScore} + ' pts'">0 pts</strong>
            </p>
            <div class="page-header__actions">
                <a th:href="@{/team/{id}/scoreboard(id=${team.id})}"
                   class="btn btn--primary" th:text="#{team.detail.scoreboard}">
                    🏆 Scoreboard
                </a>
                <a th:href="@{/team/mijn-teams}" class="btn btn--outline" th:text="#{nav.back}">← Terug</a>
            </div>
        </div>

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert alert--success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert--danger" th:text="${errorMessage}"></div>

        <!-- Two-column layout -->
        <div style="display: grid; grid-template-columns: 1fr 360px; gap: 48px; margin-bottom: 64px;">

            <!-- Ledenlijst -->
            <div>
                <div class="section-title" th:text="#{team.detail.members}">Leden</div>

                <div th:each="member : ${team.members}" class="scoreboard-row"
                     th:classappend="${member.id == currentUser.id} ? ' scoreboard-row--highlight' : ''">
                    <div class="scoreboard-row__rank">
                        <span th:text="${member.id == team.owner.id} ? '👑' : '·'"></span>
                    </div>
                    <div class="scoreboard-row__name">
                        <span th:text="${member.username}"></span>
                        <span th:if="${member.id == currentUser.id}" class="you-badge" th:text="#{team.owner.you}">jij</span>
                        <span th:if="${member.id == team.owner.id}" class="badge-owner" th:text="#{team.owner}">eigenaar</span>
                    </div>
                    <div class="scoreboard-row__score">
                        <!-- Echte score -->
                        <span style="font-size:0.75rem; color: var(--text-muted);"
                              th:text="${(userScores[member.id] != null ? userScores[member.id] : 0)} + ' pts'">
                            0 pts
                        </span>
                                            <!-- Verwijder-knop voor eigenaar -->
                                            <span th:if="${isOwner and member.id != currentUser.id}" style="margin-left:12px;">
                            <form th:action="@{/team/{id}/remove-member/{mid}(id=${team.id},mid=${member.id})}"
                                  method="post" style="display:inline;"
                                  th:onsubmit="'return confirm(\'' + #{team.detail.remove.confirm} + '\')'">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn--outline-red btn--sm"
                                        th:text="#{team.detail.remove}">Verwijderen</button>
                            </form>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Invitecode sidebar (enkel eigenaar) -->
            <div th:if="${isOwner}">
                <div class="section-title" th:text="#{team.invite}">Uitnodigen</div>
                <div class="invite-box">
                    <div>
                        <div class="invite-box__label" th:text="#{team.detail.invitecode}">Invitecode</div>
                        <div class="invite-box__code" th:text="${team.inviteCode}">ABCD1234EF</div>
                    </div>
                    <form th:action="@{/team/{id}/regenerate-code(id=${team.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn--outline btn--sm"
                                th:text="#{team.detail.regenerate}">Nieuwe code</button>
                    </form>
                </div>
                <p style="font-size:0.72rem; color: var(--text-muted); margin-top: 12px;" th:text="#{team.invite.paragraph}">
                    Deel deze code met vrienden zodat ze kunnen aansluiten.
                </p>
            </div>

        </div>
    </div>
</main>

<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
