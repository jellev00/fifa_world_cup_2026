<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${match.countryA + ' vs ' + match.countryB + ' – FIFA WC 2026'}">Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container">
        <a th:href="@{/}" class="back-link" th:text="#{nav.back.to.overview}">← Terug naar overzicht</a>

        <div class="match-detail">

            <!-- Match header -->
            <div class="match-detail__header">
                <div class="match-detail__teams">
                    <span th:text="${match.countryA}">Poland</span>
                    <span class="match-detail__vs"> vs </span>
                    <span th:text="${match.countryB}">Colombia</span>
                </div>
                <div class="match-detail__meta">
                    <span>📅 <span th:text="${#temporals.format(match.matchDateTime, #messages.msg('date.format'))}"></span></span>
                    <span>📍 <span th:text="${(match.city != null ? match.city : '') + (match.stadium != null ? ', ' + match.stadium : '')}"></span></span>
                    <span th:if="${stadiumCapacity != null}" class="capacity-badge">
            🏟️ <span th:text="${#numbers.formatInteger(stadiumCapacity, 1, 'COMMA')} + ' ' + #{match.places}"></span>
          </span>
                </div>
            </div>

            <!-- Officiële uitslag -->
            <div th:if="${match.played}" class="match-detail__score-display">
                <div class="match-detail__score-display-label" th:text="#{match.official}">Officiële uitslag</div>
                <div class="match-detail__score-display-number">
                    <span th:text="${match.officialScoreA}">2</span>
                    <span class="sep">–</span>
                    <span th:text="${match.officialScoreB}">1</span>
                </div>
            </div>

            <div th:unless="${match.played}" style="text-align:center; padding: 24px; background: var(--light-grey); margin-bottom: 32px;">
        <span style="font-size:0.78rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color: var(--text-muted);" th:text="#{match.still.to.play}">
          ⏳ Nog te spelen
        </span>
            </div>

            <!-- Admin acties -->
            <div sec:authorize="hasRole('ADMIN')" style="display:flex; gap:12px; margin-bottom:32px;">
                <a th:href="@{/admin/matches/{id}/edit(id=${match.id})}"
                   class="btn btn--outline btn--sm" th:text="#{match.update}">Wedstrijd bewerken</a>
                <a th:href="@{/admin/matches/{id}/uitslag(id=${match.id})}"
                   class="btn btn--red btn--sm" th:text="#{match.enter.result}">Uitslag ingeven</a>
            </div>

            <!-- Prognose sectie -->
            <div sec:authorize="isAuthenticated()">
                <div class="match-detail__section-title" th:text="#{prognose.title}">Jouw voorspelling</div>

                <!-- Bestaande prognose -->
                <div th:if="${prognose != null}" class="existing-prognose-display">
                    <div>
                        <div class="existing-prognose-display__label" th:text="#{prognose.title}">Jouw voorspelling</div>
                        <div class="existing-prognose-display__score">
                            <span th:text="${prognose.predictedScoreA}">1</span>
                            <span style="color:var(--red); margin:0 8px;">–</span>
                            <span th:text="${prognose.predictedScoreB}">0</span>
                        </div>
                    </div>
                    <div th:if="${match.played}" class="existing-prognose-display__pts">
                        +<span th:text="${prognose.points}">10</span> pts
                    </div>
                </div>

                <!-- Prognose formulier (open) -->
                <div th:if="${prognoseOpen}">
                    <div class="prognose-form">
                        <p style="font-size:0.75rem; font-weight:700; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:4px;"
                           th:text="${prognose != null} ? #{prognose.hint.edit} : #{prognose.hint.open}">
                            Doe jouw voorspelling
                        </p>

                        <div th:if="${successMessage}" class="alert alert--success mt-16" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert--danger mt-16" th:text="${errorMessage}"></div>

                        <form th:action="@{/prognose/match/{id}(id=${match.id})}"
                              method="post" th:object="${prognoseRequest}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <div class="prognose-score-row">
                                <div class="prognose-score-input">
                                    <label th:text="${#strings.length(match.countryA) >= 3 ? #strings.substring(match.countryA,0,3).toUpperCase() : match.countryA.toUpperCase()}">POL</label>
                                    <input type="number" th:field="*{predictedScoreA}"
                                           class="prognose-score-field" min="0" placeholder="0"/>
                                </div>
                                <div class="prognose-sep">–</div>
                                <div class="prognose-score-input">
                                    <label th:text="${#strings.length(match.countryB) >= 3 ? #strings.substring(match.countryB,0,3).toUpperCase() : match.countryB.toUpperCase()}">COL</label>
                                    <input type="number" th:field="*{predictedScoreB}"
                                           class="prognose-score-field" min="0" placeholder="0"/>
                                </div>
                            </div>

                            <span class="field-error" th:errors="*{predictedScoreA}"></span>
                            <span class="field-error" th:errors="*{predictedScoreB}"></span>

                            <button type="submit" class="btn btn--primary btn--full mt-16"
                                    th:text="${prognose != null} ? #{prognose.submit.update} : #{prognose.submit.new}">
                                Opslaan
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Gesloten -->
                <div th:unless="${prognoseOpen}" class="closed-banner" th:text="#{prognose.hint.closed}">
                    🔒 Voorspellingen zijn gesloten
                </div>
            </div>

        </div>
    </div>
</main>

<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
