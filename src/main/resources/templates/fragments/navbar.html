<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head></head>
<body>
<nav th:fragment="navbar" class="navbar">
    <div class="navbar__inner">

        <a th:href="@{/}" class="navbar__logo">
            <div class="navbar__badge">26</div>
            <div class="navbar__brand">
                <span class="navbar__brand-top" th:text="#{nav.brand}">FIFA 2026</span>
                <span class="navbar__brand-sub" th:text="#{nav.paragraph}">Team Prognose</span>
            </div>
        </a>

        <ul class="navbar__links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/top10}" th:text="#{nav.top10}">Top 10</a></li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/team/mijn-teams}" th:text="#{nav.create.team}">Mijn Team</a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/prognose/overzicht}" th:text="#{nav.forecasts}">Mijn Prognoses</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/matches}" th:text="#{nav.admin.matches}">Beheer</a>
            </li>
        </ul>

        <div class="navbar__actions">

            <div class="lang-dropdown" id="langDropdown">
                <button class="lang-dropdown__trigger" id="langTrigger" type="button">
                    <img id="activeLangFlagImg"
                         src="https://flagcdn.com/w40/nl.png"
                         alt="NL" class="lang-flag-circle"/>
                    <span id="activeLangLabel" th:text="#{language.dutch}">Nederlands</span>
                    <span id="activeLangCode" class="lang-code">(NL)</span>
                    <svg width="10" height="6" viewBox="0 0 10 6" fill="none" id="langChevron"
                         style="transition:transform 0.2s ease; flex-shrink:0; margin-left:2px;">
                        <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.8"
                              stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>

                <div class="lang-dropdown__menu" id="langMenu">
                    <a href="#" class="lang-dropdown__item" onclick="switchLang('nl'); return false;">
                        <img src="https://flagcdn.com/w40/nl.png" alt="NL" class="lang-flag-circle"/>
                        <span class="lang-item__name" th:text="#{language.dutch}">Nederlands</span>
                        <span class="lang-code">(NL)</span>
                    </a>
                    <a href="#" class="lang-dropdown__item" onclick="switchLang('en'); return false;">
                        <img src="https://flagcdn.com/w40/gb.png" alt="EN" class="lang-flag-circle"/>
                        <span class="lang-item__name" th:text="#{language.english}">English</span>
                        <span class="lang-code">(EN)</span>
                    </a>
                </div>
            </div>

            <span sec:authorize="isAnonymous()">
        <a th:href="@{/login}" class="btn-nav-login" th:text="#{nav.login}">Login</a>
        <a th:href="@{/register}" class="btn-nav-register" th:text="#{nav.register}">Registreren</a>
      </span>
            <span sec:authorize="isAuthenticated()">
        <form th:action="@{/logout}" method="post" style="display:inline;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn-nav-logout" th:text="#{nav.logout}">Uitloggen</button>
        </form>
      </span>

        </div>
    </div>

    <script>
        (function() {
            var langData = {
                nl: { flag: 'https://flagcdn.com/w40/nl.png', label: 'Nederlands', code: '(NL)' },
                en: { flag: 'https://flagcdn.com/w40/gb.png', label: 'English',    code: '(EN)' }
            };

            // Taal wisselen zonder naar home te gaan
            window.switchLang = function(lang) {
                var url    = new URL(window.location.href);
                url.searchParams.set('lang', lang);
                sessionStorage.setItem('fifaLang', lang);
                window.location.href = url.toString();
            };

            function getActiveLang() {
                var params = new URLSearchParams(window.location.search);
                var langParam = params.get('lang');
                if (langParam) sessionStorage.setItem('fifaLang', langParam);
                return sessionStorage.getItem('fifaLang') || 'nl';
            }

            function initLang() {
                var active  = getActiveLang();
                var data    = langData[active] || langData.nl;
                var flagImg = document.getElementById('activeLangFlagImg');
                var labelEl = document.getElementById('activeLangLabel');
                var codeEl  = document.getElementById('activeLangCode');
                if (flagImg) { flagImg.src = data.flag; flagImg.alt = active.toUpperCase(); }
                if (labelEl) labelEl.textContent = data.label;
                if (codeEl)  codeEl.textContent  = data.code;
            }

            function initDropdown() {
                var trigger = document.getElementById('langTrigger');
                var menu    = document.getElementById('langMenu');
                var chevron = document.getElementById('langChevron');
                if (!trigger || !menu) return;

                trigger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var isOpen = menu.classList.toggle('lang-dropdown__menu--open');
                    chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
                });

                document.addEventListener('click', function(e) {
                    var dropdown = document.getElementById('langDropdown');
                    if (dropdown && !dropdown.contains(e.target)) {
                        menu.classList.remove('lang-dropdown__menu--open');
                        chevron.style.transform = 'rotate(0deg)';
                    }
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() { initLang(); initDropdown(); });
            } else {
                initLang();
                initDropdown();
            }
        })();
    </script>

</nav>
</body>
</html>
