<!-- ERROR 403 -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <title>403 – Geen toegang</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="error-page">
            <div class="error-page__code" style="color: #ffcdd2;" th:text="${errorCode ?: '403'}">403</div>
            <h1 class="error-page__title" th:text="${errorTitle ?: 'Geen toegang'}">Geen toegang</h1>
            <p class="error-page__message" th:text="${errorMessage ?: 'Je hebt geen toestemming om deze pagina te bekijken.'}">
                Je hebt geen toestemming om deze pagina te bekijken.
            </p>
            <a th:href="@{/}" class="btn btn--primary" th:text="#{error.back.home}">🏠 Terug naar homepage</a>
        </div>
    </div>
</main>
<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
