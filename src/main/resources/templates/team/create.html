<!-- TEAM CREATE -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <title>Team aanmaken – FIFA WC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="auth-page">
    <div class="auth-card">
        <h1 class="auth-card__title" th:text="#{team.create.title}">Team aanmaken</h1>
        <p class="auth-card__subtitle">Kies een unieke naam voor jouw fantasy-team</p>

        <div th:if="${errorMessage}" class="alert alert--danger" th:text="${errorMessage}"></div>

        <form th:action="@{/team/create}" method="post" th:object="${teamRequest}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label class="form-label" th:text="#{team.name.label}">Teamnaam</label>
                <input type="text" th:field="*{name}" class="form-control"
                       th:placeholder="#{team.name.placeholder}"/>
                <span class="field-error" th:errors="*{name}"></span>
            </div>
            <button type="submit" class="btn btn--primary btn--full"
                    th:text="#{team.create.submit}">Team aanmaken</button>
        </form>

        <p class="auth-card__footer">
            <a th:href="@{/team/join}" th:text="#{team.create.or.join}">
                Al een invitecode? Sluit je aan
            </a>
        </p>
    </div>
</main>
<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
