<!-- TEAM JOIN -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <title>Team aansluiten – FIFA WC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="auth-page">
    <div class="auth-card">
        <h1 class="auth-card__title" th:text="#{team.join.title}">Lid worden</h1>
        <p class="auth-card__subtitle" th:text="#{team.join.paragraph}">Voer de invitecode in die je van je vrienden hebt gekregen</p>

        <div th:if="${errorMessage}" class="alert alert--danger" th:text="${errorMessage}"></div>

        <form th:action="@{/team/join}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label class="form-label" th:text="#{team.invitecode.label}">Invitecode</label>
                <input type="text" name="inviteCode" class="form-control"
                       th:placeholder="#{team.invitecode.placeholder}"
                       style="letter-spacing: 0.15em; text-transform: uppercase;"
                       required/>
            </div>
            <button type="submit" class="btn btn--primary btn--full"
                    th:text="#{team.join.submit}">Aansluiten</button>
        </form>

        <p class="auth-card__footer">
            <a th:href="@{/team/create}" th:text="#{team.create.own}">Eigen team aanmaken</a>
        </p>
    </div>
</main>
<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
