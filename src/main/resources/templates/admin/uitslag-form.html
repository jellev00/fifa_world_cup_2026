<!-- ADMIN UITSLAG FORM -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <title>Uitslag ingeven – Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <a th:href="@{/admin/matches}" class="back-link" th:text="#{nav.back.to.match.management}">← Wedstrijdenbeheer</a>

        <div style="max-width: 480px;">
            <div class="page-header" style="padding-top:24px;">
                <p class="page-header__eyebrow" th:text="#{uitslag.paragraph}">Admin · Uitslag</p>
                <h1 class="page-header__title" th:text="#{uitslag.title}">Uitslag ingeven</h1>
            </div>

            <!-- Match banner -->
            <div class="uitslag-match-banner">
                <div class="uitslag-match-banner__teams">
                    <span th:text="${match.countryA}">POL</span>
                    <span class="uitslag-match-banner__vs">vs</span>
                    <span th:text="${match.countryB}">COL</span>
                </div>
                <div class="uitslag-match-banner__date"
                     th:text="${#temporals.format(match.matchDateTime, 'dd/MM/yyyy HH:mm')}">datum</div>
            </div>

            <form th:action="@{/admin/matches/{id}/uitslag(id=${match.id})}"
                  method="post" th:object="${uitslagRequest}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="prognose-score-row">
                    <div class="prognose-score-input">
                        <label th:text="${#strings.length(match.countryA) >= 3 ? #strings.substring(match.countryA,0,3).toUpperCase() : match.countryA.toUpperCase()}">POL</label>
                        <input type="number" th:field="*{scoreA}" class="prognose-score-field" min="0" placeholder="0"/>
                        <span class="field-error" th:errors="*{scoreA}"></span>
                    </div>
                    <div class="prognose-sep">–</div>
                    <div class="prognose-score-input">
                        <label th:text="${#strings.length(match.countryB) >= 3 ? #strings.substring(match.countryB,0,3).toUpperCase() : match.countryB.toUpperCase()}">COL</label>
                        <input type="number" th:field="*{scoreB}" class="prognose-score-field" min="0" placeholder="0"/>
                        <span class="field-error" th:errors="*{scoreB}"></span>
                    </div>
                </div>

                <div class="form-actions" style="margin-top:24px;">
                    <button type="submit" class="btn btn--red" th:text="#{uitslag.submit}">
                        Uitslag opslaan &amp; punten berekenen
                    </button>
                    <a th:href="@{/admin/matches}" class="btn btn--outline" th:text="#{match.cancel}">Annuleren</a>
                </div>
            </form>
        </div>
    </div>
</main>
<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
