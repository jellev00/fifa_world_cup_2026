<!-- LOGIN -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inloggen – FIFA WC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="auth-page">
    <div class="auth-card">
        <h1 class="auth-card__title">Welkom<br>Terug</h1>
        <p class="auth-card__subtitle" th:text="#{login.title}">Log in op je account</p>

        <div th:if="${param.error}" class="alert alert--danger" th:text="#{login.error}"></div>
        <div th:if="${param.logout}" class="alert alert--info" th:text="#{login.logout.success}"></div>
        <div th:if="${param.registered}" class="alert alert--success" th:text="#{register.success}"></div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label class="form-label" th:text="#{login.username.label}">Gebruikersnaam</label>
                <input type="text" name="username" class="form-control"
                       placeholder="jouw gebruikersnaam" required autofocus/>
            </div>
            <div class="form-group">
                <label class="form-label" th:text="#{login.password.label}">Wachtwoord</label>
                <input type="password" name="password" class="form-control"
                       placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn--primary btn--full"
                    th:text="#{login.submit}">Inloggen</button>
        </form>

        <p class="auth-card__footer">
            <span th:text="#{login.no.account}">Nog geen account?</span>
            <a th:href="@{/register}" th:text="#{login.register.link}">Registreer hier</a>
        </p>
    </div>
</main>
<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
