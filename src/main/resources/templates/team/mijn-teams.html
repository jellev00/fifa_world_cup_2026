<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8"/>
    <title>Mijn Team – FIFA WC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="page-header">
            <p class="page-header__eyebrow">Mijn Team</p>
            <h1 class="page-header__title">Mijn Teams</h1>
            <p class="page-header__subtitle">Jouw fantasy-teams en scores</p>
            <div class="page-header__actions">
                <a th:href="@{/team/create}" class="btn btn--red">+ Team aanmaken</a>
                <a th:href="@{/team/join}" class="btn btn--outline">Lid worden</a>
            </div>
        </div>

        <!-- Geen teams -->
        <div th:if="${#lists.isEmpty(teams)}" class="empty-state">
            <p class="empty-state__title">Je bent nog geen lid van een team</p>
            <p class="empty-state__text">Maak een team aan of sluit je aan via een invitecode.</p>
        </div>

        <!-- Teams grid -->
        <div class="teams-grid" th:unless="${#lists.isEmpty(teams)}">
            <div th:each="team : ${teams}" class="team-card">
                <div class="team-card__header">
                    <div class="team-card__name" th:text="${team.name}">Teamnaam</div>
                    <div class="team-card__score-label">Totaalscore</div>
                    <div class="team-card__score-value">0</div>
                </div>

                <ul class="team-card__members">
                    <li th:each="member : ${team.members}" class="team-card__member">
            <span class="team-card__member-name">
              <span th:text="${member.username}"></span>
              <span th:if="${member.id == team.owner.id}" class="team-card__member-owner">eigenaar</span>
            </span>
                        <span class="team-card__member-pts">0 pts</span>
                    </li>
                </ul>

                <div style="display:flex; gap:10px; margin-top:16px;">
                    <a th:href="@{/team/{id}(id=${team.id})}"
                       class="btn btn--primary btn--sm">Teampagina</a>
                    <a th:href="@{/team/{id}/scoreboard(id=${team.id})}"
                       class="btn btn--outline btn--sm">Scoreboard</a>
                </div>
            </div>
        </div>

    </div>
</main>
<footer class="site-footer">© 2026 FIFA Team Prognose</footer>
</body>
</html>
